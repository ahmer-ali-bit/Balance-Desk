name: shop
description: "Desktop shop ledger management system."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  app_links: ^6.4.1
  crypto: ^3.0.3
  cupertino_icons: ^1.0.8
  file_picker: ^11.0.2
  open_filex: ^4.5.0
  package_info_plus: ^8.0.3
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.11.3
  printing: ^5.14.2
  provider: ^6.1.5
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.6
  intl: ^0.20.2
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  shared_preferences: ^2.5.5
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  uuid: ^4.5.3
  device_info_plus: ^12.4.0
  http: ^1.6.0
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.13
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

msix_config:
  display_name: Balance Desk
  publisher_display_name: Balance Desk
  identity_name: BalanceDesk.App
  publisher: CN=Balance Desk
  msix_version: 1.0.0.0
  logo_path: assets/branding/balance-desk-app-icon-1024.png
  trim_logo: false
  architecture: x64
  capabilities: internetClient
  output_path: build/windows/msix
  output_name: balance-desk

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo.png"

  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 256
